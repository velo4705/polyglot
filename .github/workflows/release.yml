name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5.3.0
      with:
        go-version: '1.22'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build binaries
      run: |
        mkdir -p dist
        GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/polyglot-linux-amd64   ./cmd/polyglot
        GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/polyglot-linux-arm64   ./cmd/polyglot
        GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/polyglot-darwin-amd64  ./cmd/polyglot
        GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/polyglot-darwin-arm64  ./cmd/polyglot
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/polyglot-windows-amd64.exe ./cmd/polyglot

    - name: Create checksums
      run: |
        cd dist
        sha256sum * > checksums.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/polyglot-linux-amd64
          dist/polyglot-linux-arm64
          dist/polyglot-darwin-amd64
          dist/polyglot-darwin-arm64
          dist/polyglot-windows-amd64.exe
          dist/checksums.txt
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
